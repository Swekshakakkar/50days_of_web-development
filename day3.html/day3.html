<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnFlow - Tech Skills</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* 1. Top Navbar Styling */
        .top-navbar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background-color: #8a2be2; /* BlueViolet */
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .top-navbar .logo {
            color: white;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .top-navbar ul {
            list-style: none;
            display: flex;
        }

        .top-navbar a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .top-navbar a:hover {
            color: #00eaff; /* Hover effect color */
        }

        /* 2. Hero Section (The Blue/Purple Gradient Part) */
        .hero-section {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); /* Same as image_840196.png */
            text-align: center;
            padding: 100px 20px;
            color: white;
            border-radius: 0 0 50px 50px; /* Curves at the bottom */
        }

        .hero-section h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .hero-section p {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto 30px auto;
            opacity: 0.9;
        }

        /* 3. Buttons Styling */
        .btn-group {
            margin-top: 30px;
        }

        .btn-get-started {
            background-color: #00c9a7; /* Teal/Green color from image */
            color: white;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-right: 15px;
            transition: 0.3s;
        }

        .btn-roadmap {
            background-color: transparent;
            color: white;
            padding: 15px 35px;
            border: 2px solid white;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-get-started:hover, .btn-roadmap:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* 4. Quote Styling */
        .quote {
            text-align: center;
            padding: 40px 20px;
            font-style: italic;
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <header id="home">
        <!-- Navigation -->
        <nav class="top-navbar">
            <div class="logo">LEARNFLOW</div>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#courses">Courses</a></li>
                <li><a href="#roadmap">Roadmap</a></li>
                <li><a href="#tutorial">Tutorial</a></li>
                <li><a href="#quiz">Quiz</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>

        <!-- Hero Content (Full Background Section) -->
        <div class="hero-section">
            <h1>Level Up Your Coding Skills</h1>
            <p>An interactive student-led hub for mastering modern web technologies and programming logic.</p>

            <div class="btn-group">
                <button class="btn-get-started" onclick="location.href='#courses'">Get Started</button>
                <button class="btn-roadmap" onclick="location.href='#roadmap'">View Roadmap</button>
            </div>

            <p class="quote">
                "The beautiful thing about learning is that no one can take it away from you."<br>
                — B.B. King
            </p>
        </div>
    </header>

</body>
</html>
